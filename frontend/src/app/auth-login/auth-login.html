<div class="login-container">
  <div class="login-card">
    
    <div class="header-text">
      <h2>Comedor Universitario</h2>
      <p>Inicia sesión para gestionar tu acceso</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      
      <div class="input-group">
        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" formControlName="email" placeholder="alumno@universidad.edu">
      </div>

      <div class="input-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" formControlName="password" placeholder="••••••••">
      </div>

      <button type="submit" [disabled]="loginForm.invalid">Entrar</button>
      
    </form>
  </div>
</div>
